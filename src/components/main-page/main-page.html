<div class="container">

    <div class="step-bar-div">
    <steps-bar></steps-bar>
    </div>

    <div class="step-div">
        @switch (step) {
            @case (1) {<personal-info-form></personal-info-form>}
            @case (2) {<select-plan></select-plan>}
            @case (3) {<add-on></add-on>}
            @case (4) {<confirmation></confirmation>}
            @case (5) {<final-message></final-message>}
    }
    
    <div class="options-div">
        @if(step > 1){
            <go-back-button (PreviousStep)="PreviousStep()"></go-back-button>
        }
        @if(step >= 1 && step < 5){
            <next-button (NextStep)="NextStep()"></next-button>
        }@else {
            <confirm ></confirm>
        }
    </div>
    </div>
   
</div>
